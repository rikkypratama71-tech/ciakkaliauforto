<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Pribadi Fina - Gear 5 Treasure Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&family=Bangers&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0a1f44;
            --card-bg: rgba(17, 17, 17, 0.9);
            --text: #e0e0e0;
            --gold: #ffd700;
            --gold-dark: #d4af37;
            --gold-light: #ffeb3b;
            --gold-glow: rgba(255, 215, 0, 0.5);
            --red: #c0392b;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1a3a6d 0%, #000b1a 100%);
            color: var(--text);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Efek Awan Gear 5 */
        body::after {
            content: "☁️"; position: fixed; top: 15%; left: -100px; font-size: 80px; opacity: 0.1;
            animation: floatCloud 30s linear infinite;
        }

        @keyframes floatCloud {
            to { left: 110%; }
        }

        .container { width: 100%; max-width: 600px; z-index: 10; margin-top: 50px; }

        h1 {
            font-family: 'Bangers', cursive;
            text-align: center;
            color: var(--gold);
            font-size: clamp(2.5rem, 8vw, 4rem);
            text-shadow: 4px 4px 0 #000, 0 0 20px var(--gold-glow);
            margin-bottom: 10px;
        }

        #loginPage, #appPage {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px var(--gold-glow);
            border: 3px solid var(--gold);
            backdrop-filter: blur(10px);
        }

        /* Dashboard Style */
        .saldo-container { text-align: center; margin-bottom: 30px; }
        .saldo {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--gold-glow));
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Animasi Stretch Gear 5 */
        .gear5-active .saldo { animation: gear5Stretch 0.8s infinite; }
        @keyframes gear5Stretch {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(2deg); }
        }

        .form-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        input {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--gold-dark);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: var(--gold-light); box-shadow: 0 0 15px var(--gold-glow); }

        button {
            background: linear-gradient(45deg, var(--gold-dark), var(--gold));
            color: black;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Bangers';
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.03); box-shadow: 0 0 20px var(--gold-glow); }

        table { width: 100%; border-collapse: collapse; }
        th { color: var(--gold); border-bottom: 2px solid var(--gold); padding: 10px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        .btn-del { background: var(--red); color: white; padding: 5px 10px; font-size: 0.8rem; font-family: sans-serif; }
        .logout { background: transparent; color: var(--gold); border: 1px solid var(--gold); font-size: 0.8rem; padding: 5px 10px; margin-bottom: 10px; }

        .gear5-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 9999;
        }
        @keyframes flashEffect { 0% { opacity: 0.7; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="gear5Flash" class="gear5-flash"></div>

<div class="container">
    <div id="loginPage">
        <h1>KEUANGAN FINA</h1>
        <h3 style="text-align: center; color: white; font-weight: 400;">Awakening Mode!</h3>
        <p style="text-align:center; font-size: 0.9rem;">Masukkan password rahasia Joy Boy!</p>
        <div class="form-group">
            <input type="password" id="passwordInput" placeholder="Gear... Up!">
            <button onclick="handleLogin()">BANGKIT! (MASUK)</button>
        </div>
        <p style="text-align: center; font-size: 0.7rem; opacity: 0.6;">Hint: luffy</p>
    </div>

    <div id="appPage" style="display:none;">
        <button class="logout" onclick="logout()">← Log Out</button>
        
        <div class="saldo-container">
            <div class="saldo-label" style="color: var(--gold);">Harta Karun Joy Boy</div>
            <div class="saldo">฿ <span id="saldo">0</span></div>
        </div>

        <div class="form-group">
            <input type="text" id="descInput" placeholder="Nama Transaksi (ex: Beli Daging)">
            <input type="number" id="amountInput" placeholder="Jumlah Berry (Minus untuk pengeluaran)">
            <button onclick="addTransaction()">BERLAYAR! 🏴‍☠️</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Catatan</th>
                    <th>Berry</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="transactionList"></tbody>
        </table>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('pirate_finance_fina')) || [];

    // FUNGSI LOGIN
    function handleLogin() {
        const pass = document.getElementById('passwordInput').value.trim().toLowerCase();
        // Password diset: luffy
        if(pass === "luffy") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            triggerGear5();
            renderApp();
        } else {
            alert("Haki lo belum kuat! Password salah.");
        }
    }

    function logout() {
        location.reload();
    }

    // ANIMASI GEAR 5
    function triggerGear5() {
        const flash = document.getElementById('gear5Flash');
        flash.style.animation = 'flashEffect 0.6s ease-out';
        document.body.classList.add('gear5-active');
        
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#ffffff', '#ffd700', '#ffeb3b']
        });

        setTimeout(() => {
            flash.style.animation = '';
            document.body.classList.remove('gear5-active');
        }, 1000);
    }

    // LOGIKA APLIKASI
    function addTransaction() {
        const desc = document.getElementById('descInput').value;
        const amount = parseInt(document.getElementById('amountInput').value);

        if(!desc || isNaN(amount)) return alert("Isi data yang bener, Nakama!");

        const newTx = { id: Date.now(), desc, amount };
        transactions.push(newTx);
        localStorage.setItem('pirate_finance_fina', JSON.stringify(transactions));

        if(amount > 0) triggerGear5();

        document.getElementById('descInput').value = '';
        document.getElementById('amountInput').value = '';
        renderApp();
    }

    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem('pirate_finance_fina', JSON.stringify(transactions));
        renderApp();
    }

    function renderApp() {
        const list = document.getElementById('transactionList');
        const saldoEl = document.getElementById('saldo');
        let total = 0;
        list.innerHTML = '';

        transactions.forEach(t => {
            total += t.amount;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.desc}</td>
                <td style="color: ${t.amount >= 0 ? '#44ff44' : '#ff4444'}">
                    ${t.amount >= 0 ? '+' : ''}${t.amount.toLocaleString()} ฿
                </td>
                <td><button class="btn-del" onclick="deleteTransaction(${t.id})">X</button></td>
            `;
            list.appendChild(row);
        });

        saldoEl.innerText = total.toLocaleString();
    }
</script>

</body>
</html>
