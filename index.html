<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Pribadi Fina</title>
    <!-- Google Fonts untuk tampilan mewah -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Chart.js untuk grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Confetti emas -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#111111">

    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --text: #e0e0e0;
            --gold: #d4af37;
            --gold-dark: #b8972e;
            --gold-light: #f0d06e;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --red: #c0392b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at top right, #1a1a1a, #0a0a0a);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--gold);
            margin: 20px 0 30px;
            font-size: clamp(2em, 8vw, 3em);
            text-shadow: 0 0 15px var(--gold-glow);
        }
        #loginPage, #appPage {
            background: var(--card-bg);
            padding: clamp(20px, 5vw, 50px) clamp(15px, 4vw, 40px);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(212,175,55,0.1);
            border: 1px solid rgba(212,175,55,0.3);
        }
        .saldo-container { text-align: center; margin: clamp(30px, 8vw, 50px) 0; }
        .saldo-label {
            font-size: clamp(1.2em, 4vw, 1.4em);
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .saldo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3em, 12vw, 5em);
            font-weight: 700;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--gold-glow), 0 0 40px rgba(212,175,55,0.4);
            animation: glowPulse 5s infinite alternate;
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 10px var(--gold-glow); }
            100% { text-shadow: 0 0 30px var(--gold-glow), 0 0 60px rgba(212,175,55,0.6); }
        }
        button {
            width: 100%;
            padding: clamp(12px, 4vw, 16px);
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: clamp(1em, 4vw, 1.2em);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            background: linear-gradient(145deg, #f0d06e, #d4af37, #b8972e);
            color: #111;
            box-shadow: inset 0 2px 8px rgba(255,255,255,0.4), 0 6px 20px rgba(212,175,55,0.5), inset 0 -4px 10px rgba(0,0,0,0.3);
            border: 1px solid #e6c14e;
        }
        button:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: inset 0 2px 12px rgba(255,255,255,0.6), 0 12px 30px rgba(212,175,55,0.7);
        }
        button:active { transform: translateY(1px); box-shadow: inset 0 4px 10px rgba(0,0,0,0.5); }
        .logout { background: linear-gradient(145deg, #c0392b, #a93226); box-shadow: 0 6px 20px rgba(192,57,43,0.5); }
        .logout:hover { box-shadow: 0 12px 30px rgba(192,57,43,0.7); }
        input, select {
            width: 100%;
            padding: clamp(12px, 4vw, 16px);
            margin: 12px 0;
            background: #181818;
            border: 1px solid var(--gold-dark);
            border-radius: 10px;
            color: var(--text);
            font-size: clamp(1em, 3.5vw, 1.1em);
        }
        input:focus, select:focus {
            border-color: var(--gold-light);
            box-shadow: 0 0 20px var(--gold-glow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        th, td { padding: clamp(10px, 3vw, 16px); text-align: left; }
        th { background: linear-gradient(90deg, var(--gold-dark), var(--gold)); color: #111; }
        .hapus { color: #ff8787; cursor: pointer; }
        .hapus:hover { color: #ffb3b3; }
        #chartContainer {
            margin: 40px 0;
            padding: 20px;
            background: #161616;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        canvas { max-height: 400px; }
        @media (max-width: 600px) {
            body { padding: 10px; }
            #loginPage, #appPage { padding: 25px 15px; border-radius: 16px; }
            table { font-size: 0.9em; }
            th, td { padding: 10px; }
            #chartContainer { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <h1>Keuangan Pribadi Fina</h1>
        <h2>Masuk</h2>
        <p id="loginMsg">Masukkan password (pertama kali buat password baru).</p>
        <input type="password" id="passwordInput" placeholder="Password" required>
        <button onclick="handleLogin()">Masuk / Set Password</button>
    </div>

    <div id="appPage" style="display:none;">
        <button class="logout" onclick="logout()">Keluar (Logout)</button>
        
        <div class="saldo-container">
            <div class="saldo-label">Saldo Saat Ini</div>
            <div class="saldo"><span style="font-size:0.6em; vertical-align:super;">Rp</span><span id="saldo">0</span></div>
        </div>

        <form id="formTransaksi">
            <select id="tipe">
                <option value="pemasukan">Pemasukan</option>
                <option value="pengeluaran">Pengeluaran</option>
            </select>
            <input type="text" id="deskripsi" placeholder="Deskripsi (misal: Gaji / Makan)" required>
            <input type="number" id="jumlah" placeholder="Jumlah (Rp)" required min="1">
            <input type="date" id="tanggal" required>
            <button type="submit">Tambah Transaksi</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Tipe</th>
                    <th>Deskripsi</th>
                    <th>Jumlah</th>
                    <th>Tanggal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="daftarTransaksi"></tbody>
        </table>

        <div id="chartContainer">
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>
</div>

<!-- Suara klik -->
<audio id="clickSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3" type="audio/mpeg">
</audio>

<script>
    const PASSWORD_KEY = 'finakeuangan_password';
    const TRANS_KEY = 'finakeuangan_transaksi';
    let transaksi = JSON.parse(localStorage.getItem(TRANS_KEY)) || [];
    let isLoggedIn = false;
    let prevSaldo = 0;

    const loginPage = document.getElementById('loginPage');
    const appPage = document.getElementById('appPage');
    const passwordInput = document.getElementById('passwordInput');
    const loginMsg = document.getElementById('loginMsg');
    const clickAudio = document.getElementById('clickSound');

    function hashPassword(pw) { return btoa(pw); }

    function checkPassword() {
        const stored = localStorage.getItem(PASSWORD_KEY);
        if (!stored) {
            loginMsg.textContent = "Belum ada password. Buat sekarang!";
            return null;
        }
        return stored;
    }

    function handleLogin() {
        const pw = passwordInput.value.trim();
        if (!pw) return alert("Password jangan kosong!");
        const stored = checkPassword();
        if (!stored) {
            if (confirm("Set password baru? Ingat ya!")) {
                localStorage.setItem(PASSWORD_KEY, hashPassword(pw));
                alert("Password diset! Masuk lagi.");
                passwordInput.value = '';
            }
        } else {
            if (hashPassword(pw) === stored) {
                isLoggedIn = true;
                loginPage.style.display = 'none';
                appPage.style.display = 'block';
                tampilkanTransaksi();
            } else {
                alert("Password salah!");
            }
        }
    }

    function logout() {
        isLoggedIn = false;
        appPage.style.display = 'none';
        loginPage.style.display = 'block';
        passwordInput.value = '';
    }

    function playClick() {
        clickAudio.currentTime = 0;
        clickAudio.play().catch(() => {});
    }

    function updateSaldo() {
        let saldo = 0;
        transaksi.forEach(t => saldo += (t.tipe === 'pemasukan' ? t.jumlah : -t.jumlah));
        document.getElementById('saldo').textContent = saldo.toLocaleString('id-ID');
        return saldo;
    }

    function launchGoldConfetti() {
        const duration = 4000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        const interval = setInterval(() => {
            const timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            confetti({ ...defaults, particleCount: 5, angle: 60, origin: { x: 0, y: Math.random() - 0.2 }, colors: ['#d4af37', '#f0d06e', '#b8972e', '#ffd700'] });
            confetti({ ...defaults, particleCount: 5, angle: 120, origin: { x: 1, y: Math.random() - 0.2 }, colors: ['#d4af37', '#f0d06e', '#b8972e', '#ffd700'] });
        }, 250);
    }

    function tampilkanTransaksi() {
        const tbody = document.getElementById('daftarTransaksi');
        tbody.innerHTML = '';
        transaksi.forEach((t, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${t.tipe.charAt(0).toUpperCase() + t.tipe.slice(1)}</td>
                <td>${t.deskripsi}</td>
                <td>Rp ${t.jumlah.toLocaleString('id-ID')}</td>
                <td>${t.tanggal}</td>
                <td><span class="hapus" onclick="hapus(${i})">Hapus</span></td>
            `;
            tbody.appendChild(tr);
        });
        const currentSaldo = updateSaldo();
        if (currentSaldo > prevSaldo) launchGoldConfetti();
        prevSaldo = currentSaldo;
        updateMonthlyChart();
    }

    function simpan() { localStorage.setItem(TRANS_KEY, JSON.stringify(transaksi)); }

    function hapus(index) {
        if (confirm("Yakin hapus?")) {
            transaksi.splice(index, 1);
            simpan();
            tampilkanTransaksi();
        }
    }

    let monthlyChart;
    function updateMonthlyChart() {
        if (!isLoggedIn) return;
        const monthlyData = {};
        transaksi.forEach(t => {
            const date = new Date(t.tanggal);
            const monthKey = date.toISOString().slice(0, 7);
            if (!monthlyData[monthKey]) monthlyData[monthKey] = 0;
            monthlyData[monthKey] += (t.tipe === 'pemasukan' ? t.jumlah : -t.jumlah);
        });
        const sortedMonths = Object.keys(monthlyData).sort();
        const labels = sortedMonths.map(m => new Date(m + '-01').toLocaleString('id-ID', { month: 'long', year: 'numeric' }));
        const data = sortedMonths.map(m => monthlyData[m]);

        const ctx = document.getElementById('monthlyChart').getContext('2d');
        if (monthlyChart) monthlyChart.destroy();
        monthlyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels.length ? labels : ['Belum ada data'],
                datasets: [{
                    label: 'Saldo Akhir Bulanan',
                    data: data,
                    borderColor: '#d4af37',
                    backgroundColor: 'rgba(212, 175, 55, 0.2)',
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#f0d06e',
                    pointBorderColor: '#b8972e',
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: false, ticks: { color: '#e0e0e0' } }, x: { ticks: { color: '#e0e0e0' } } },
                plugins: { legend: { labels: { color: '#e0e0e0' } } }
            }
        });
    }

    document.getElementById('formTransaksi').addEventListener('submit', e => {
        e.preventDefault();
        if (!isLoggedIn) return;
        playClick();
        const tipe = document.getElementById('tipe').value;
        const deskripsi = document.getElementById('deskripsi').value;
        const jumlah = parseInt(document.getElementById('jumlah').value);
        const tanggal = document.getElementById('tanggal').value;
        transaksi.push({ tipe, deskripsi, jumlah, tanggal });
        simpan();
        tampilkanTransaksi();
        e.target.reset();
    });

    document.querySelector('#loginPage button').addEventListener('click', playClick);

    if (localStorage.getItem(PASSWORD_KEY)) {
        loginMsg.textContent = "Masukkan password untuk akses.";
    }
</script>
</body>
</html>
