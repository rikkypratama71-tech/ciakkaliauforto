<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Fina - Black Gold Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Bangers&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #FFD700;
            --black-deep: #0a0a0a;
            --black-card: #141414;
            --text-gray: #b0b0b0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--black-deep);
            /* Tekstur Peta Tua Statis */
            background-image: 
                linear-gradient(rgba(10, 10, 10, 0.9), rgba(10, 10, 10, 0.9)),
                url('https://www.transparenttextures.com/patterns/old-map.png');
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 500px;
            padding: 20px;
        }

        #loginPage, #appPage {
            background: var(--black-card);
            padding: 40px 30px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            position: relative;
        }

        h1 {
            font-family: 'Bangers', cursive;
            color: var(--gold-light);
            text-align: center;
            font-size: 3rem;
            letter-spacing: 3px;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 0px #000;
        }

        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Wallet Section */
        .wallet-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .wallet-box {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--gold);
            padding: 15px;
            border-radius: 5px;
        }

        .label { font-size: 0.7rem; color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        .amount { font-size: 1.6rem; font-weight: 900; letter-spacing: 1px; }

        /* Form Styling */
        .input-group { margin-bottom: 15px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); outline: none; background: #222; }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--gold), #f9e29c);
            border: none;
            border-radius: 5px;
            color: black;
            font-family: 'Bangers';
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); }

        /* History Table */
        .history-section {
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 8px; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .txt-gold { color: var(--gold-light); font-weight: bold; }
        
        .btn-delete { color: #555; cursor: pointer; border: none; background: none; font-size: 0.7rem; }
        .btn-delete:hover { color: #ff4444; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <h1>GEAR 5 BANK</h1>
        <div class="subtitle">Secure Treasure Storage</div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="ENTER ACCESS CODE...">
        </div>
        <button onclick="handleLogin()">AUTHENTICATE ☠️</button>
    </div>

    <div id="appPage" style="display:none;">
        <h1>TREASURY</h1>
        <div class="subtitle">Financial Log System</div>
        
        <div class="wallet-container">
            <div class="wallet-box">
                <div class="label">IDR BALANCE (RUPIAH)</div>
                <div class="amount" id="saldoIDR">Rp 0</div>
            </div>
            <div class="wallet-box">
                <div class="label">THB BALANCE (BAHT)</div>
                <div class="amount" id="saldoTHB">฿ 0</div>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="descInput" placeholder="Transaction description...">
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input type="number" id="amountInput" placeholder="Amount" style="flex: 2;">
            <select id="currencySelect" style="flex: 1;">
                <option value="IDR">IDR (Rp)</option>
                <option value="THB">THB (฿)</option>
            </select>
        </div>
        <button onclick="addTransaction()">LOG TRANSACTION</button>

        <div class="history-section">
            <table id="list"></table>
        </div>
        
        <p style="text-align: center; margin-top: 20px;">
            <button onclick="location.reload()" style="background: none; color: #555; font-size: 0.7rem; padding: 5px;">Secure Logout</button>
        </p>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('fina_gold_data')) || [];
    let savedPass = localStorage.getItem('fina_p') || "luffy";

    function handleLogin() {
        if(document.getElementById('passwordInput').value === savedPass) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            confetti({ particleCount: 50, colors: ['#D4AF37', '#ffffff'] });
            render();
        } else {
            alert("ACCESS DENIED: Weak Haki detected.");
        }
    }

    function addTransaction() {
        const desc = document.getElementById('descInput').value;
        const amount = parseInt(document.getElementById('amountInput').value);
        const curr = document.getElementById('currencySelect').value;

        if(!desc || isNaN(amount)) return;

        transactions.push({ id: Date.now(), desc, amount, curr });
        localStorage.setItem('fina_gold_data', JSON.stringify(transactions));
        
        document.getElementById('descInput').value = '';
        document.getElementById('amountInput').value = '';
        render();
    }

    function deleteTx(id) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem('fina_gold_data', JSON.stringify(transactions));
        render();
    }

    function render() {
        let idr = 0, thb = 0, html = '';
        const list = document.getElementById('list');
        
        [...transactions].reverse().forEach(t => {
            if(t.curr === "IDR") idr += t.amount; else thb += t.amount;
            
            html += `
                <tr>
                    <td style="color: #888;">${t.desc}</td>
                    <td class="txt-gold" style="text-align: right;">
                        <span style="color:${t.amount >= 0 ? 'lime':'#ff4444'}">
                            ${t.amount.toLocaleString()} ${t.curr === "IDR" ? 'Rp' : '฿'}
                        </span>
                    </td>
                    <td style="width: 20px; text-align: right;">
                        <button class="btn-delete" onclick="deleteTx(${t.id})">✕</button>
                    </td>
                </tr>
            `;
        });

        document.getElementById('saldoIDR').innerText = "Rp " + idr.toLocaleString();
        document.getElementById('saldoTHB').innerText = "฿ " + thb.toLocaleString();
        list.innerHTML = html;
    }
</script>

</body>
</html>
