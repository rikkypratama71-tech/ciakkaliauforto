<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Pribadi Fina - One Piece Treasure Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&family=Bangers&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a1f44">

    <style>
        :root {
            --bg: #0a1f44; /* Laut malam One Piece */
            --card-bg: rgba(17, 17, 17, 0.85);
            --text: #e0e0e0;
            --gold: #ffd700; /* Treasure gold */
            --gold-dark: #d4af37;
            --gold-light: #ffeb3b;
            --gold-glow: rgba(255, 215, 0, 0.6);
            --accent-white: #ffffff; /* Gear 5 vibe */
            --red: #c0392b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a1f44 0%, #001122 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            background-image: url('https://images.alphacoders.com/135/1358650.jpg'); /* Subtle One Piece sea/sky bg, ganti kalau mau */
            background-size: cover;
            background-attachment: fixed;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 {
            font-family: 'Bangers', cursive;
            text-align: center;
            color: var(--gold);
            margin: 20px 0 30px;
            font-size: clamp(2.2em, 9vw, 3.5em);
            text-shadow: 3px 3px 0 #000, 0 0 20px var(--gold-glow);
            letter-spacing: 2px;
        }
        #loginPage, #appPage {
            background: var(--card-bg);
            padding: clamp(20px, 5vw, 50px) clamp(15px, 4vw, 40px);
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 30px var(--gold-glow);
            border: 2px solid var(--gold);
            backdrop-filter: blur(8px);
        }
        /* Saldo dengan bounce animasi */
        .saldo-container { text-align: center; margin: 40px 0; }
        .saldo {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5em, 13vw, 6em);
            font-weight: 900;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--accent-white), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px var(--gold-glow);
            animation: glowPulse 4s infinite alternate, bounce 0.6s ease;
        }
        @keyframes glowPulse { 0% { text-shadow: 0 0 15px var(--gold-glow); } 100% { text-shadow: 0 0 40px var(--gold-glow); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        /* Tombol dengan ripple wave (gelombang laut One Piece) */
        button {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: 600;
            background: linear-gradient(145deg, var(--gold), var(--gold-dark));
            color: #000;
            box-shadow: 0 6px 20px var(--gold-glow);
            border: 2px solid var(--accent-white);
            transition: all 0.3s;
        }
        button::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }
        button:hover::after { width: 300px; height: 300px; }
        button:hover { transform: scale(1.05); box-shadow: 0 12px 30px var(--gold-glow); }
        .logout { background: linear-gradient(145deg, var(--red), #8b0000); }
        /* Row transaksi fade-in + sparkle */
        tr.new-row { animation: fadeInSpark 1s ease-out; }
        @keyframes fadeInSpark {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .sparkle { animation: sparkle 1.5s infinite; }
        @keyframes sparkle { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
        /* Responsif */
        @media (max-width: 600px) { h1 { font-size: 2.5em; } .saldo { font-size: 3.5em; } }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage">
        <h1>Keuangan Pribadi Fina</h1>
        <h2>Masuk ke Kapal!</h2>
        <p id="loginMsg">Masukkan password (pertama kali buat password baru).</p>
        <input type="password" id="passwordInput" placeholder="Password rahasia harta karun" required>
        <button onclick="handleLogin()">Masuk / Set Password</button>
    </div>

    <div id="appPage" style="display:none;">
        <button class="logout" onclick="logout()">Keluar dari Kapal (Logout)</button>
        
        <div class="saldo-container">
            <div class="saldo-label">Harta Karun Saat Ini</div>
            <div class="saldo"><span style="font-size:0.6em;">Rp</span> <span id="saldo">0</span></div>
        </div>

        <form id="formTransaksi">
            <select id="tipe">
                <option value="pemasukan">Pemasukan (Harta Masuk)</option>
                <option value="pengeluaran">Pengeluaran (Harta Keluar)</option>
            </select>
            <input type="text" id="deskripsi" placeholder="Deskripsi (misal: Gaji / Beli daging)" required>
            <input type="number" id="jumlah" placeholder="Jumlah Belly (Rp)" required min="1">
            <input type="date" id="tanggal" required>
            <button type="submit">Tambah ke Log Buku Harian!</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Tipe</th>
                    <th>Deskripsi</th>
                    <th>Jumlah</th>
                    <th>Tanggal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="daftarTransaksi"></tbody>
        </table>

        <div id="chartContainer">
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>
</div>

<audio id="clickSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3" type="audio/mpeg">
</audio>

<script>
    // Kode JS sama seperti sebelumnya, tapi tambah animasi row baru
    // ... (copy semua JS dari versi sebelumnya: PASSWORD_KEY, transaksi, handleLogin, logout, playClick, updateSaldo, launchGoldConfetti, tampilkanTransaksi, simpan, hapus, updateMonthlyChart)

    // Tambah di dalam tampilkanTransaksi() untuk animasi row
    function tampilkanTransaksi() {
        const tbody = document.getElementById('daftarTransaksi');
        tbody.innerHTML = '';
        transaksi.forEach((t, i) => {
            const tr = document.createElement('tr');
            tr.classList.add('new-row'); // Fade-in + sparkle
            tr.innerHTML = `
                <td>${t.tipe === 'pemasukan' ? 'Pemasukan' : 'Pengeluaran'}</td>
                <td>${t.deskripsi}</td>
                <td>Rp ${t.jumlah.toLocaleString('id-ID')}</td>
                <td>${t.tanggal}</td>
                <td><span class="hapus" onclick="hapus(${i})">Hapus</span></td>
            `;
            tbody.appendChild(tr);
        });
        const currentSaldo = updateSaldo();
        if (currentSaldo > prevSaldo) {
            launchGoldConfetti(); // Confetti treasure
            // Tambah sparkle di saldo
            document.querySelector('.saldo').classList.add('sparkle');
            setTimeout(() => document.querySelector('.saldo').classList.remove('sparkle'), 2000);
        }
        prevSaldo = currentSaldo;
        updateMonthlyChart();
    }

    // Sisanya sama seperti kode sebelumnya...
    // (paste bagian script lengkap dari respons terakhir kalau perlu)
</script>
</body>
</html>
