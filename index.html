<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIAKKALIAU - WEBSITE </title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Bangers&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0a1f44;
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.5);
            --red: #c0392b;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #1a3a6d 0%, #000b1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 600px; margin-top: 30px; }

        #loginPage, #appPage, #settingsPage {
            background: rgba(17, 17, 17, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px var(--gold-glow);
            border: 3px solid var(--gold);
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Bangers', cursive; text-align: center; color: var(--gold); font-size: 3rem; text-shadow: 3px 3px 0 #000; margin-bottom: 10px; }

        /* Multi-Currency Balance */
        .balance-box { text-align: center; margin-bottom: 30px; padding: 20px; border-bottom: 2px dashed var(--gold); }
        .main-balance { font-size: 3rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px var(--gold-glow); margin: 0; }
        .sub-balance { font-size: 1.5rem; color: var(--gold); opacity: 0.9; margin-top: 5px; }

        .form-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        input { background: rgba(255,255,255,0.05); border: 2px solid var(--gold-dark); padding: 15px; border-radius: 12px; color: white; font-size: 1rem; }
        
        button { background: linear-gradient(45deg, #d4af37, var(--gold)); color: black; border: none; padding: 15px; border-radius: 12px; font-family: 'Bangers'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.03); box-shadow: 0 0 20px var(--gold-glow); }

        .logout-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .btn-small { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; font-size: 0.8rem; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .amount-idr { font-weight: 600; display: block; }
        .amount-thb { font-size: 0.8rem; opacity: 0.7; }

        .gear5-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 9999; }
        @keyframes flashEffect { 0% { opacity: 0.7; } 100% { opacity: 0; } }
        .gear5-active .main-balance { animation: bounce 0.6s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) rotate(2deg); } }
    </style>
</head>
<body>

<div id="gear5Flash" class="gear5-flash"></div>

<div class="container">
    <div id="loginPage">
        <h1>WELCOME CIAK </h1>
        <div class="form-group">
            <input type="password" id="passwordInput" placeholder="Masukkan Password Joy Boy...">
            <button onclick="handleLogin()">MASUK </button>
        </div>
        <p style="text-align: center; font-size: 0.7rem; opacity: 0.5;">Default: luffy</p>
    </div>

    <div id="appPage" style="display:none;">
        <div class="logout-row">
            <button class="btn-small" onclick="location.reload()">Log Out</button>
            <button class="btn-small" onclick="showSettings()">Settings ⚙️</button>
        </div>
        
        <div class="balance-box">
            <div class="main-balance" id="saldoIDR">Rp 0</div>
            <div class="sub-balance" id="saldoTHB">฿ 0.00 (Baht)</div>
        </div>

        <div class="form-group">
            <input type="text" id="descInput" placeholder="Catatan (Beli Ramen)">
            <input type="number" id="amountInput" placeholder="Jumlah Rupiah (Rp)">
            <button onclick="addTransaction()">GAS!</button>
        </div>

        <table>
            <tbody id="transactionList"></tbody>
        </table>
    </div>

    <div id="settingsPage" style="display:none;">
        <h1>SETTINGS</h1>
        <div class="form-group">
            <input type="password" id="newPassword" placeholder="Password Baru">
            <button onclick="saveNewPassword()">SIMPAN PASSWORD</button>
            <button class="btn-small" onclick="hideSettings()">KEMBALI</button>
        </div>
    </div>
</div>

<script>
    let transactions = JSON.parse(localStorage.getItem('fina_finance')) || [];
    let currentPassword = localStorage.getItem('fina_pass') || "luffy";
    const KURS_BAHT = 450; // 1 Baht = Rp450

    function handleLogin() {
        if(document.getElementById('passwordInput').value === currentPassword) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appPage').style.display = 'block';
            triggerGear5();
            renderApp();
        } else { alert("Salah!"); }
    }

    function showSettings() {
        document.getElementById('appPage').style.display = 'none';
        document.getElementById('settingsPage').style.display = 'block';
    }

    function hideSettings() {
        document.getElementById('settingsPage').style.display = 'none';
        document.getElementById('appPage').style.display = 'block';
    }

    function saveNewPassword() {
        const p = document.getElementById('newPassword').value;
        if(p) {
            localStorage.setItem('fina_pass', p);
            alert("Password diganti! Login ulang.");
            location.reload();
        }
    }

    function triggerGear5() {
        const flash = document.getElementById('gear5Flash');
        flash.style.animation = 'flashEffect 0.6s ease-out';
        document.body.classList.add('gear5-active');
        confetti({ particleCount: 100, colors: ['#ffffff', '#ffd700'] });
        setTimeout(() => { 
            flash.style.animation = ''; 
            document.body.classList.remove('gear5-active');
        }, 1000);
    }

    function addTransaction() {
        const desc = document.getElementById('descInput').value;
        const amount = parseInt(document.getElementById('amountInput').value);
        if(!desc || isNaN(amount)) return;

        transactions.push({ id: Date.now(), desc, amount });
        localStorage.setItem('fina_finance', JSON.stringify(transactions));
        if(amount > 0) triggerGear5();
        document.getElementById('descInput').value = '';
        document.getElementById('amountInput').value = '';
        renderApp();
    }

    function deleteTransaction(id) {
        transactions = transactions.filter(t => t.id !== id);
        localStorage.setItem('fina_finance', JSON.stringify(transactions));
        renderApp();
    }

    function renderApp() {
        const list = document.getElementById('transactionList');
        let total = 0;
        list.innerHTML = '';
        
        transactions.forEach(t => {
            total += t.amount;
            const thbValue = (t.amount / KURS_BAHT).toFixed(2);
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${t.desc}</td>
                <td style="color: ${t.amount >= 0 ? '#44ff44' : '#ff4444'}">
                    <span class="amount-idr">${t.amount >= 0 ? '+' : ''}${t.amount.toLocaleString()} Rp</span>
                    <span class="amount-thb">฿ ${thbValue}</span>
                </td>
                <td><button style="padding:5px; font-size:10px" onclick="deleteTransaction(${t.id})">X</button></td>
            `;
            list.appendChild(row);
        });

        document.getElementById('saldoIDR').innerText = "Rp " + total.toLocaleString();
        document.getElementById('saldoTHB').innerText = "฿ " + (total / KURS_BAHT).toFixed(2) + " (Baht)";
    }
</script>
</body>
</html>
