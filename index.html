<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Pribadi Fina - Gear 5 Treasure Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&family=Bangers&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0a1f44">

    <style>
        :root {
            --bg: #0a1f44;
            --card-bg: rgba(17, 17, 17, 0.85);
            --text: #e0e0e0;
            --gold: #ffd700;
            --gold-dark: #d4af37;
            --gold-light: #ffeb3b;
            --gold-glow: rgba(255, 215, 0, 0.7);
            --white-glow: rgba(255, 255, 255, 0.8);
            --red: #c0392b;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a1f44 0%, #001122 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            background-size: cover;
            background-attachment: fixed;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 {
            font-family: 'Bangers', cursive;
            text-align: center;
            color: var(--gold);
            font-size: clamp(2.5em, 10vw, 4em);
            text-shadow: 4px 4px 0 #000, 0 0 25px var(--gold-glow);
            margin: 20px 0;
        }
        #loginPage, #appPage {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px var(--gold-glow);
            border: 3px solid var(--gold);
        }
        .saldo {
            font-size: clamp(4em, 15vw, 7em);
            font-weight: 900;
            background: linear-gradient(90deg, var(--gold), var(--gold-light), #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px var(--gold-glow);
            transition: transform 0.5s;
        }
        .gear5-active .saldo {
            animation: gear5Stretch 1.2s ease-in-out;
        }
        @keyframes gear5Stretch {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(5deg); }
        }
        .gear5-flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            animation: flashWhite 0.8s ease-out;
        }
        @keyframes flashWhite {
            0% { opacity: 0.6; }
            100% { opacity: 0; }
        }
        button {
            background: linear-gradient(145deg, var(--gold), var(--gold-dark));
            color: #000;
            box-shadow: 0 8px 25px var(--gold-glow);
            border: 2px solid white;
        }
        button:hover { transform: scale(1.08); box-shadow: 0 15px 40px var(--gold-glow); }
        /* Sisanya style seperti sebelumnya (tabel, input, dll) */
        tr.new-row { animation: fadeInSpark 1.2s ease-out; }
        @keyframes fadeInSpark { 0% { opacity: 0; transform: translateY(30px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <!-- Login & App Page seperti sebelumnya, dengan teks One Piece flavor -->
    <div id="loginPage">
        <h1>Keuangan Pribadi Fina</h1>
        <h2>Awakening Mode!</h2>
        <p id="loginMsg">Masukkan password rahasia Joy Boy!</p>
        <input type="password" id="passwordInput" placeholder="Gear... Up!" required>
        <button onclick="handleLogin()">Bangkit! (Masuk / Set Password)</button>
    </div>

    <div id="appPage" style="display:none;">
        <button class="logout" onclick="logout()">Kembali ke East Blue (Logout)</button>
        
        <div class="saldo-container">
            <div class="saldo-label">Harta Karun Joy Boy Saat Ini</div>
            <div class="saldo"><span>Rp</span> <span id="saldo">0</span></div>
        </div>

        <!-- Form & Tabel sama seperti sebelumnya -->

        <!-- Flash effect untuk Gear 5 -->
        <div id="gear5Flash" class="gear5-flash"></div>
    </div>
</div>

<!-- Audio -->
<audio id="clickSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3" type="audio/mpeg">
</audio>
<audio id="gear5Laugh" preload="auto">
    <source src="https://www.voicy.network/sounds/bYK8Hau-30us3GUNgGvAcw-gear-5-luffy-laugh" type="audio/mpeg"> <!-- Ganti dengan link MP3 free kalau ini nggak work -->
</audio>
<audio id="drumsLiberation" preload="auto">
    <source src="https://www.voicy.network/sounds/DSvMiQiA00yo02gFNKUdJg-drums-of-liberation" type="audio/mpeg"> <!-- Drums of Liberation free preview -->
</audio>

<script>
    // ... (kode JS core sama seperti sebelumnya: transaksi, login, updateSaldo, confetti, chart, dll)

    const gear5Laugh = document.getElementById('gear5Laugh');
    const drums = document.getElementById('drumsLiberation');
    const flashDiv = document.getElementById('gear5Flash');

    function triggerGear5() {
        // Flash putih + animasi stretch
        flashDiv.style.opacity = '0.6';
        document.body.classList.add('gear5-active');
        setTimeout(() => {
            flashDiv.style.opacity = '0';
            document.body.classList.remove('gear5-active');
        }, 800);

        // Play suara Gear 5
        drums.currentTime = 0;
        drums.play().catch(() => {});
        setTimeout(() => {
            gear5Laugh.currentTime = 0;
            gear5Laugh.play().catch(() => {});
        }, 400);

        // Confetti lebih gila (white + gold)
        confetti({
            particleCount: 150,
            spread: 180,
            origin: { y: 0.6 },
            colors: ['#ffffff', '#ffd700', '#ffeb3b', '#d4af37']
        });
    }

    // Di updateSaldo atau tampilkanTransaksi, panggil triggerGear5 kalau saldo naik besar
    // Contoh di akhir updateSaldo():
    // if (currentSaldo - prevSaldo > 10000) triggerGear5();  // Sesuaikan threshold

    // Sisanya script seperti sebelumnya...
</script>
</body>
</html>
