<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Pribadi Fina</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --text: #e0e0e0;
            --gold: #d4af37;
            --gold-dark: #b8972e;
            --gold-glow: rgba(212, 175, 55, 0.25);
            --red: #c0392b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            color: var(--gold);
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 10px var(--gold-glow);
        }
        #loginPage, #appPage {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 20px var(--gold-glow);
            border: 1px solid var(--gold-dark);
        }
        #loginPage h2 {
            color: var(--gold);
            text-align: center;
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: #1e1e1e;
            border: 1px solid var(--gold-dark);
            border-radius: 8px;
            color: var(--text);
            font-size: 1em;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 12px var(--gold-glow);
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        #formTransaksi button, #loginPage button {
            background: linear-gradient(90deg, var(--gold), #e6c14e);
            color: #111;
            box-shadow: 0 4px 15px var(--gold-glow);
        }
        #formTransaksi button:hover, #loginPage button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--gold-glow);
        }
        #appPage button.logout {
            background: var(--red);
            color: white;
        }
        #appPage button.logout:hover {
            background: #a93226;
        }
        .saldo {
            text-align: center;
            font-size: 1.8em;
            margin: 30px 0;
            color: var(--gold);
            font-weight: 600;
            text-shadow: 0 0 10px var(--gold-glow);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background: #161616;
            border-radius: 12px;
            overflow: hidden;
        }
        th {
            background: var(--gold-dark);
            color: #111;
            padding: 14px;
            font-weight: 600;
        }
        td {
            padding: 14px;
            border-bottom: 1px solid #222;
        }
        tr:last-child td { border-bottom: none; }
        .hapus {
            color: #ff6b6b;
            cursor: pointer;
            font-weight: 600;
            transition: color 0.3s;
        }
        .hapus:hover { color: #ff8787; }
        #loginMsg { text-align: center; margin-bottom: 20px; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <!-- Halaman Login -->
    <div id="loginPage">
        <h1>Keuangan Pribadi Fina</h1>
        <h2>Masuk</h2>
        <p id="loginMsg">Masukkan password (pertama kali buat password baru).</p>
        <input type="password" id="passwordInput" placeholder="Password" required>
        <button onclick="handleLogin()">Masuk / Set Password</button>
    </div>

    <!-- Halaman App -->
    <div id="appPage" style="display:none;">
        <button class="logout" onclick="logout()">Keluar (Logout)</button>
        
        <div class="saldo">Saldo Saat Ini: Rp <span id="saldo">0</span></div>

        <form id="formTransaksi">
            <select id="tipe">
                <option value="pemasukan">Pemasukan</option>
                <option value="pengeluaran">Pengeluaran</option>
            </select>
            <input type="text" id="deskripsi" placeholder="Deskripsi (misal: Gaji / Makan)" required>
            <input type="number" id="jumlah" placeholder="Jumlah (Rp)" required min="1">
            <input type="date" id="tanggal" required>
            <button type="submit">Tambah</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Tipe</th>
                    <th>Deskripsi</th>
                    <th>Jumlah</th>
                    <th>Tanggal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="daftarTransaksi"></tbody>
        </table>
    </div>
</div>

<script>
    const PASSWORD_KEY = 'finakeuangan_password';
    const TRANS_KEY = 'finakeuangan_transaksi';
    let transaksi = JSON.parse(localStorage.getItem(TRANS_KEY)) || [];
    let isLoggedIn = false;

    const loginPage = document.getElementById('loginPage');
    const appPage = document.getElementById('appPage');
    const passwordInput = document.getElementById('passwordInput');
    const loginMsg = document.getElementById('loginMsg');

    function hashPassword(pw) { return btoa(pw); }

    function checkPassword() {
        const stored = localStorage.getItem(PASSWORD_KEY);
        if (!stored) {
            loginMsg.textContent = "Belum ada password. Buat sekarang!";
            return null;
        }
        return stored;
    }

    function handleLogin() {
        const pw = passwordInput.value.trim();
        if (!pw) return alert("Password jangan kosong!");

        const stored = checkPassword();
        if (!stored) {
            if (confirm("Set password baru? Ingat baik-baik ya!")) {
                localStorage.setItem(PASSWORD_KEY, hashPassword(pw));
                alert("Password diset! Masuk lagi.");
                passwordInput.value = '';
            }
        } else {
            if (hashPassword(pw) === stored) {
                isLoggedIn = true;
                loginPage.style.display = 'none';
                appPage.style.display = 'block';
                tampilkanTransaksi();
            } else {
                alert("Password salah!");
            }
        }
    }

    function logout() {
        isLoggedIn = false;
        appPage.style.display = 'none';
        loginPage.style.display = 'block';
        passwordInput.value = '';
    }

    function updateSaldo() {
        let saldo = 0;
        transaksi.forEach(t => {
            saldo += (t.tipe === 'pemasukan' ? t.jumlah : -t.jumlah);
        });
        document.getElementById('saldo').textContent = saldo.toLocaleString('id-ID');
    }

    function tampilkanTransaksi() {
        const tbody = document.getElementById('daftarTransaksi');
        tbody.innerHTML = '';
        transaksi.forEach((t, i) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${t.tipe.charAt(0).toUpperCase() + t.tipe.slice(1)}</td>
                <td>${t.deskripsi}</td>
                <td>Rp ${t.jumlah.toLocaleString('id-ID')}</td>
                <td>${t.tanggal}</td>
                <td><span class="hapus" onclick="hapus(${i})">Hapus</span></td>
            `;
            tbody.appendChild(tr);
        });
        updateSaldo();
    }

    function simpan() {
        localStorage.setItem(TRANS_KEY, JSON.stringify(transaksi));
    }

    function hapus(index) {
        if (confirm("Yakin hapus?")) {
            transaksi.splice(index, 1);
            simpan();
            tampilkanTransaksi();
        }
    }

    document.getElementById('formTransaksi').addEventListener('submit', e => {
        e.preventDefault();
        if (!isLoggedIn) return;
        const tipe = document.getElementById('tipe').value;
        const deskripsi = document.getElementById('deskripsi').value;
        const jumlah = parseInt(document.getElementById('jumlah').value);
        const tanggal = document.getElementById('tanggal').value;
        transaksi.push({ tipe, deskripsi, jumlah, tanggal });
        simpan();
        tampilkanTransaksi();
        e.target.reset();
    });

    if (localStorage.getItem(PASSWORD_KEY)) {
        loginMsg.textContent = "Masukkan password untuk akses.";
    }
</script>
</body>
</html>
