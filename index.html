<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keuangan Pribadi Fina</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Confetti CDN (sudah ada sebelumnya) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <!-- Manifest untuk PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#111111">
    <style>
        /* CSS lama + tweak kecil untuk chart */
        :root {
            --bg: #0a0a0a;
            --card-bg: #111111;
            --text: #e0e0e0;
            --gold: #d4af37;
            --gold-dark: #b8972e;
            --gold-light: #f0d06e;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --red: #c0392b;
        }
        /* ... (copy semua CSS dari versi sebelumnya, tambah ini untuk chart) */
        #chartContainer {
            margin: 40px 0;
            padding: 20px;
            background: #161616;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        canvas { max-height: 400px; }
        @media (max-width: 600px) { #chartContainer { padding: 15px; } }
    </style>
</head>
<body>

<div class="container">
    <!-- Login Page -->
    <div id="loginPage">
        <h1>Keuangan Pribadi Fina</h1>
        <h2>Masuk</h2>
        <p id="loginMsg">Masukkan password (pertama kali buat baru).</p>
        <input type="password" id="passwordInput" placeholder="Password" required>
        <button onclick="handleLogin()">Masuk / Set Password</button>
    </div>

    <!-- App Page -->
    <div id="appPage" style="display:none;">
        <button class="logout" onclick="logout()">Keluar (Logout)</button>
        
        <div class="saldo-container">
            <div class="saldo-label">Saldo Saat Ini</div>
            <div class="saldo">
                <span style="font-size:0.6em; vertical-align:super;">Rp</span><span id="saldo">0</span>
            </div>
        </div>

        <form id="formTransaksi">
            <select id="tipe">
                <option value="pemasukan">Pemasukan</option>
                <option value="pengeluaran">Pengeluaran</option>
            </select>
            <input type="text" id="deskripsi" placeholder="Deskripsi (misal: Gaji / Makan)" required>
            <input type="number" id="jumlah" placeholder="Jumlah (Rp)" required min="1">
            <input type="date" id="tanggal" required>
            <button type="submit">Tambah Transaksi</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Tipe</th>
                    <th>Deskripsi</th>
                    <th>Jumlah</th>
                    <th>Tanggal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="daftarTransaksi"></tbody>
        </table>

        <!-- Grafik Saldo Bulanan -->
        <div id="chartContainer">
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>
</div>

<!-- Audio untuk klik -->
<audio id="clickSound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3" type="audio/mpeg">
</audio>

<script>
    // ... (kode JS lama: PASSWORD_KEY, TRANS_KEY, transaksi, isLoggedIn, prevSaldo, functions handleLogin, logout, updateSaldo, launchGoldConfetti, tampilkanTransaksi, simpan, hapus)

    // Tambah efek suara klik
    const clickAudio = document.getElementById('clickSound');
    function playClick() {
        clickAudio.currentTime = 0;
        clickAudio.play().catch(e => console.log("Audio error:", e)); // Handle autoplay policy
    }

    // Override submit form untuk play sound + confetti
    document.getElementById('formTransaksi').addEventListener('submit', e => {
        e.preventDefault();
        if (!isLoggedIn) return;
        playClick(); // Suara klik
        // ... (kode push transaksi lama)
        const tipe = document.getElementById('tipe').value;
        // ... (push, simpan, tampilkanTransaksi, reset)
    });

    // Play sound juga di login button (opsional)
    document.querySelector('#loginPage button').addEventListener('click', playClick);

    // Grafik Saldo Bulanan
    let monthlyChart;
    function updateMonthlyChart() {
        if (!isLoggedIn) return;

        // Group by month (YYYY-MM)
        const monthlyData = {};
        transaksi.forEach(t => {
            const date = new Date(t.tanggal);
            const monthKey = date.toISOString().slice(0, 7); // YYYY-MM
            if (!monthlyData[monthKey]) monthlyData[monthKey] = 0;
            monthlyData[monthKey] += (t.tipe === 'pemasukan' ? t.jumlah : -t.jumlah);
        });

        // Sort months
        const sortedMonths = Object.keys(monthlyData).sort();
        const labels = sortedMonths.map(m => new Date(m + '-01').toLocaleString('id-ID', { month: 'long', year: 'numeric' }));
        const data = sortedMonths.map(m => monthlyData[m]);

        const ctx = document.getElementById('monthlyChart').getContext('2d');
        if (monthlyChart) monthlyChart.destroy();

        monthlyChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels.length ? labels : ['Belum ada data'],
                datasets: [{
                    label: 'Saldo Akhir Bulanan',
                    data: data,
                    borderColor: '#d4af37',
                    backgroundColor: 'rgba(212, 175, 55, 0.2)',
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#f0d06e',
                    pointBorderColor: '#b8972e',
                    pointHoverRadius: 8
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: false, ticks: { color: '#e0e0e0' } },
                    x: { ticks: { color: '#e0e0e0' } }
                },
                plugins: { legend: { labels: { color: '#e0e0e0' } } }
            }
        });
    }

    // Panggil update chart setelah tampilkanTransaksi
    // Di akhir tampilkanTransaksi() tambah: updateMonthlyChart();

    // PWA Push Notifications Basic
    if ('serviceWorker' in navigator && 'PushManager' in window) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => {
                console.log('Service Worker registered');
                reg.pushManager.getSubscription().then(sub => {
                    if (!sub) {
                        // Minta permission & subscribe (jalankan sekali manual via console atau button)
                        Notification.requestPermission().then(perm => {
                            if (perm === 'granted') {
                                reg.pushManager.subscribe({
                                    userVisibleOnly: true,
                                    applicationServerKey: 'YOUR_PUBLIC_VAPID_KEY_HERE' // Ganti dengan VAPID public key
                                }).then(sub => console.log('Subscribed:', sub));
                            }
                        });
                    }
                });
            })
            .catch(err => console.log('SW error:', err));
    }

    // Di tampilkanTransaksi() setelah update, bisa trigger notif sederhana (local)
    // Untuk real push, butuh server kirim ke endpoint subscription
    // Untuk sekarang, contoh local notif:
    function showLocalNotification(title, body) {
        if (Notification.permission === 'granted') {
            new Notification(title, { body });
        }
    }

    // Contoh panggil setelah tambah transaksi: showLocalNotification('Transaksi Baru', 'Saldo telah diperbarui!');
</script>
</body>
</html>
